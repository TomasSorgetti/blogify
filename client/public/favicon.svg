<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0a" rx="40"/>
  
  <!-- Favicon mark -->
  <g transform="translate(40, 40)">
    <!-- Document outline -->
    <rect x="0" y="0" width="120" height="120" rx="8" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
    
    <!-- Content lines -->
    <line x1="16" y1="24" x2="104" y2="24" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
    <line x1="16" y1="44" x2="104" y2="44" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <line x1="16" y1="64" x2="84" y2="64" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    
    <!-- Accent beam -->
    <path d="M 16 90 Q 40 100 60 90 T 104 90" stroke="url(#faviconGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Accent corner -->
    <circle cx="112" cy="8" r="6" fill="url(#faviconGrad)"/>
  </g>
</svg>
